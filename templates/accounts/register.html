{% extends 'base.html' %}

{% block content %}

<div class="container content-section">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
            <div class="form-card">
                <div class="form-card-header text-center">
                    <span class="page-kicker justify-content-center"><i class="bi bi-person-plus me-2"></i>New Account</span>
                    <h1>Register</h1>
                    <p>Create an account to request and track ambulance bookings.</p>
                </div>

                <form method="POST" class="styled-form">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button class="btn btn-primary btn-lg w-100">
                        <i class="bi bi-person-plus me-2"></i>Register
                    </button>

                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
